# Steve AI Observability Configuration
# This file configures the distributed tracing and metrics collection system.

# ============================================================================
# TRACING CONFIGURATION
# ============================================================================

# Enable/disable distributed tracing
tracing.enabled=true

# Enable LLM call tracing (tracks API calls to OpenAI, Groq, etc.)
tracing.llm.enabled=true

# Enable skill execution tracing (tracks skill library usage)
tracing.skill.enabled=true

# Enable Contract Net protocol tracing (tracks multi-agent coordination)
tracing.contractNet.enabled=true

# How long to retain trace data in memory (hours)
tracing.retentionHours=24

# ============================================================================
# METRICS CONFIGURATION
# ============================================================================

# Enable/disable metrics collection
metrics.enabled=true

# Enable agent metrics (task completion, success rate, execution time)
metrics.agent.enabled=true

# Enable LLM metrics (tokens, cost, latency, per-model breakdown)
metrics.llm.enabled=true

# Enable skill metrics (usage frequency, success rate, duration)
metrics.skill.enabled=true

# Enable system health metrics (memory, CPU, uptime)
metrics.systemHealth.enabled=true

# How long to retain metrics data in memory (hours)
metrics.retentionHours=72

# ============================================================================
# EXPORT CONFIGURATION
# ============================================================================

# Export directory for all observability data
# Relative paths are resolved from the game working directory
export.directory=observability/exports

# Enable JSON export (machine-readable, for dashboards and analysis tools)
export.json.enabled=true

# Enable CSV export (spreadsheet-compatible)
export.csv.enabled=true

# Maximum queue size for pending exports
export.queueSize=10000

# ============================================================================
# AUTOMATIC EXPORT
# ============================================================================

# Enable automatic scheduled export
export.auto.enabled=true

# How often to auto-export (minutes)
export.auto.intervalMinutes=5

# Export data on shutdown (ensures no data is lost)
export.onShutdown=true

# ============================================================================
# NOTES
# ============================================================================
#
# Environment Variables:
#   Any property can be overridden with environment variables using the
#   format: EXPORT_DIRECTORY=/path/to/exports
#
# System Properties:
#   Any property can be overridden with Java system properties:
#   -Dexport.directory=/path/to/exports
#
# Performance Impact:
#   - Tracing: Minimal overhead when enabled (~1-2% CPU)
#   - Metrics: Negligible overhead (<1% CPU)
#   - Export: Occurs on background thread, doesn't block game
#
# Storage Requirements:
#   - Traces: ~1KB per span, ~10-100MB per hour with heavy use
#   - Metrics: ~5KB per update, ~1-5MB per hour
#   - Export files: Compressed JSON/CSV, ~50% of in-memory size
#
# ============================================================================
